name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # Lint and test Python code
  test-receiver:
    name: Test Receiver
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: receiver/requirements.txt

      - name: Install dependencies
        run: |
          cd receiver
          pip install -r requirements.txt
          pip install pytest pytest-asyncio ruff mypy

      - name: Lint with Ruff
        run: |
          cd receiver
          ruff check app/

      - name: Type check with MyPy
        run: |
          cd receiver
          mypy app/ --ignore-missing-imports || true

      - name: Run tests
        run: |
          cd receiver
          pytest tests/ -v || echo "No tests found yet"

  # Build Docker images
  build-docker:
    name: Build Docker Images
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build receiver image
        uses: docker/build-push-action@v5
        with:
          context: ./receiver
          push: false
          tags: ecowitt-receiver:test
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # Build dashboard
  build-dashboard:
    name: Build Dashboard
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: |
          cd dashboard
          npm install

      - name: Build
        run: |
          cd dashboard
          npm run build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dashboard-build
          path: dashboard/dist/
