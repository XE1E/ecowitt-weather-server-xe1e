name = "estacion-test-ingest"
main = "src/index.ts"
compatibility_date = "2024-11-01"

# --- Ruta en tu dominio (necesaria para probar el comportamiento HTTP del borde) ---
# Antes de desplegar:
#   1) En Cloudflare (DNS) crea el registro  estacion-test  como PROXIED (nube naranja).
#      Puede ser un CNAME a tu dominio o un A a cualquier IP; da igual: lo atiende el Worker.
#   2) Ajusta 'pattern' y 'zone_name' si tu dominio no es xe1e.net.
[[routes]]
pattern = "estacion-test.xe1e.net/*"
zone_name = "xe1e.net"

# Nota: el subdominio *.workers.dev es SOLO HTTPS, así que NO sirve para esta
# prueba (no puedes verificar el redirect http->https). Debe ser tu dominio.
