# Home Assistant - Estación Ecowitt vía API REST del VPS (Arquitectura B)
# ---------------------------------------------------------------------------
# HA está en una red remota; lee los datos desde el servidor por HTTPS.
# Una sola petición cada 60s a /api/current expone todos los sensores.
#
# CÓMO USARLO (recomendado: paquetes)
#   1) En configuration.yaml (una vez):
#        homeassistant:
#          packages: !include_dir_named packages
#   2) Copia este archivo a  <config>/packages/ecowitt.yaml
#   3) Revisa la config (Ajustes → Sistema → Reiniciar → Comprobar config) y reinicia.
#
# Alternativa sin paquetes: pega el bloque `rest:` de abajo en tu configuration.yaml.
# ---------------------------------------------------------------------------

rest:
  - resource: https://clima.xe1e.net/api/current
    scan_interval: 60
    # Si el servidor aún no tiene datos, /api/current da 404 -> sensores "no disponibles"
    sensor:
      - name: "Clima Temperatura Exterior"
        unique_id: clima_temp_outdoor
        value_template: "{{ value_json.temperature_outdoor }}"
        unit_of_measurement: "°C"
        device_class: temperature
        state_class: measurement

      - name: "Clima Sensación Térmica"
        unique_id: clima_feels_like
        value_template: "{{ value_json.feels_like }}"
        unit_of_measurement: "°C"
        device_class: temperature
        state_class: measurement

      - name: "Clima Punto de Rocío"
        unique_id: clima_dew_point
        value_template: "{{ value_json.dew_point }}"
        unit_of_measurement: "°C"
        device_class: temperature
        state_class: measurement

      - name: "Clima Humedad Exterior"
        unique_id: clima_humidity_outdoor
        value_template: "{{ value_json.humidity_outdoor }}"
        unit_of_measurement: "%"
        device_class: humidity
        state_class: measurement

      - name: "Clima Presión"
        unique_id: clima_pressure
        value_template: "{{ value_json.pressure_relative }}"
        unit_of_measurement: "hPa"
        device_class: atmospheric_pressure
        state_class: measurement

      - name: "Clima Viento"
        unique_id: clima_wind_speed
        value_template: "{{ value_json.wind_speed }}"
        unit_of_measurement: "km/h"
        device_class: wind_speed
        state_class: measurement
        icon: mdi:weather-windy

      - name: "Clima Ráfaga"
        unique_id: clima_wind_gust
        value_template: "{{ value_json.wind_gust }}"
        unit_of_measurement: "km/h"
        device_class: wind_speed
        state_class: measurement
        icon: mdi:weather-windy-variant

      - name: "Clima Dirección Viento"
        unique_id: clima_wind_dir
        value_template: "{{ value_json.wind_direction }}"
        unit_of_measurement: "°"
        state_class: measurement
        icon: mdi:compass

      - name: "Clima Dirección Viento Cardinal"
        unique_id: clima_wind_dir_cardinal
        icon: mdi:compass-outline
        value_template: >
          {% set d = value_json.wind_direction | float(0) %}
          {{ ['N','NE','E','SE','S','SO','O','NO'][(((d + 22.5) % 360) / 45) | int] }}

      - name: "Clima Tasa de Lluvia"
        unique_id: clima_rain_rate
        value_template: "{{ value_json.rain_rate }}"
        unit_of_measurement: "mm/h"
        device_class: precipitation_intensity
        state_class: measurement
        icon: mdi:weather-rainy

      - name: "Clima Lluvia Diaria"
        unique_id: clima_rain_daily
        value_template: "{{ value_json.rain_daily }}"
        unit_of_measurement: "mm"
        device_class: precipitation
        state_class: total_increasing
        icon: mdi:weather-pouring

      - name: "Clima Índice UV"
        unique_id: clima_uv
        value_template: "{{ value_json.uv_index }}"
        state_class: measurement
        icon: mdi:sun-wireless

      - name: "Clima Radiación Solar"
        unique_id: clima_solar
        value_template: "{{ value_json.solar_radiation }}"
        unit_of_measurement: "W/m²"
        device_class: irradiance
        state_class: measurement

      - name: "Clima Temperatura Interior"
        unique_id: clima_temp_indoor
        value_template: "{{ value_json.temperature_indoor }}"
        unit_of_measurement: "°C"
        device_class: temperature
        state_class: measurement

      - name: "Clima Humedad Interior"
        unique_id: clima_humidity_indoor
        value_template: "{{ value_json.humidity_indoor }}"
        unit_of_measurement: "%"
        device_class: humidity
        state_class: measurement

      # --- Canales WN31 (1-8): solo aparecen si el sensor reporta ---
      - name: "Clima Temp Canal 1"
        unique_id: clima_temp_ch1
        value_template: "{{ value_json.temperature_ch1 }}"
        availability: "{{ value_json.temperature_ch1 is defined }}"
        unit_of_measurement: "°C"
        device_class: temperature
        state_class: measurement
      - name: "Clima Humedad Canal 1"
        unique_id: clima_humidity_ch1
