server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;

    # Archivos que NO deben cachearse como inmutables (deben revalidarse en cada
    # deploy). El service worker y el manifest son críticos: si se cachean, el
    # sitio se queda "pegado" en una versión vieja. Los match exactos tienen
    # prioridad sobre la regex de estáticos de más abajo.
    location = /sw.js {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        expires -1;
    }
    location = /manifest.webmanifest {
        add_header Cache-Control "no-cache";
    }
    location = /index.html {
        add_header Cache-Control "no-cache";
    }

    # SPA routing
    location / {
        try_files $uri $uri/ /index.html;
    }

    # API proxy
    location /api {
        proxy_pass http://receiver:8080;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }

    # Ecowitt push endpoint -> receiver.
    # The WS2910/gateway POSTs weather data here. This MUST be proxied to the
    # receiver; otherwise the SPA fallback below would swallow the POST (return
    # index.html) and the data would be silently lost. Prefix match covers both
    # "/data/report" and "/data/report/".
    location /data/report {
        proxy_pass http://receiver:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Health check -> receiver
    location = /health {
        proxy_pass http://receiver:8080/health;
    }

    # Cache static assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
