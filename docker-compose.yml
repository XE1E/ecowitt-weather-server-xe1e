services:
  # Receiver - Receives data from Ecowitt gateway
  receiver:
    build: ./receiver
    container_name: ecowitt-receiver
    # No host port: the dashboard (nginx) is the single public entrypoint and
    # proxies /api and /data/report to receiver:8080 over the internal network.
    # For standalone dev, uncomment the ports mapping below.
    # ports:
    #   - "${SERVER_PORT:-8080}:8080"
    expose:
      - "8080"
    volumes:
      - receiver-data:/data
      # SO real del host (Ubuntu) para el panel de datos técnicos; el contenedor
      # por sí solo reportaría su imagen base (Debian). Solo lectura.
      - /etc/os-release:/host/os-release:ro
      # Hostname real del host; dentro del contenedor platform.node() devuelve
      # el ID del contenedor, no el del servidor.
      - /etc/hostname:/host/hostname:ro
    # Carga TODO el .env al contenedor (alertas, telegram, waqi, admin, etc.)
    env_file:
      - .env
    environment:
      - INFLUXDB_URL=${INFLUXDB_URL:-http://influxdb:8086}
      - INFLUXDB_TOKEN=${INFLUXDB_TOKEN}
      - INFLUXDB_ORG=${INFLUXDB_ORG:-weather}
      - INFLUXDB_BUCKET=${INFLUXDB_BUCKET:-ecowitt}
      - MQTT_ENABLED=${MQTT_ENABLED:-false}
      - MQTT_BROKER=${MQTT_BROKER}
      - MQTT_PORT=${MQTT_PORT:-1883}
      - MQTT_USERNAME=${MQTT_USERNAME}
      - MQTT_PASSWORD=${MQTT_PASSWORD}
      - MQTT_TOPIC=${MQTT_TOPIC:-weather/ecowitt}
      - OUTPUT_UNIT_SYSTEM=${OUTPUT_UNIT_SYSTEM:-metric}
      - TZ=${TZ:-UTC}
    depends_on:
      - influxdb
    restart: unless-stopped
    networks:
      - ecowitt-network

  # InfluxDB - Time series database
  influxdb:
    image: influxdb:2.7
    container_name: ecowitt-influxdb
    # Kept internal (not published) for security on a public VPS.
    # For admin UI access, tunnel over SSH: ssh -L 8086:localhost:8086 ...
    expose:
      - "8086"
    volumes:
      - influxdb-data:/var/lib/influxdb2
      - influxdb-config:/etc/influxdb2
    environment:
      - DOCKER_INFLUXDB_INIT_MODE=setup
      - DOCKER_INFLUXDB_INIT_USERNAME=admin
      - DOCKER_INFLUXDB_INIT_PASSWORD=adminpassword
      - DOCKER_INFLUXDB_INIT_ORG=${INFLUXDB_ORG:-weather}
      - DOCKER_INFLUXDB_INIT_BUCKET=${INFLUXDB_BUCKET:-ecowitt}
      - DOCKER_INFLUXDB_INIT_RETENTION=${DATA_RETENTION_DAYS:-90}d
      - DOCKER_INFLUXDB_INIT_ADMIN_TOKEN=${INFLUXDB_TOKEN}
    restart: unless-stopped
    networks:
      - ecowitt-network

  # Grafana - Visualization (optional)
  grafana:
    image: grafana/grafana:latest
    container_name: ecowitt-grafana
    ports:
      - "3000:3000"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
    depends_on:
      - influxdb
    restart: unless-stopped
    networks:
      - ecowitt-network
    profiles:
      - grafana

  # Dashboard - Web frontend (single public entrypoint)
  # Serves the React UI and reverse-proxies /api and /data/report to the receiver.
  dashboard:
    build: ./dashboard
    container_name: ecowitt-dashboard
    ports:
      - "${WEB_PORT:-8080}:80"
    depends_on:
      - receiver
    restart: unless-stopped
    networks:
      - ecowitt-network

  # Caddy - Reverse proxy con HTTPS automático (Let's Encrypt) para el dominio.
  # Producción con dominio: docker compose --profile caddy up -d
  # (el dashboard sigue publicado en 8080 para el push HTTP del WS2910 por IP)
  caddy:
    image: caddy:2
    container_name: ecowitt-caddy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - ./caddy/certs:/etc/caddy/certs:ro
      - caddy-data:/data
      - caddy-config:/config
    depends_on:
      - dashboard
    restart: unless-stopped
    networks:
      - ecowitt-network
    profiles:
      - caddy

volumes:
  influxdb-data:
  influxdb-config:
  grafana-data:
  caddy-data:
  caddy-config:
  receiver-data:

networks:
  ecowitt-network:
    driver: bridge
