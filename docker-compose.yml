version: '3.8'

services:
  # Receiver - Receives data from Ecowitt gateway
  receiver:
    build: ./receiver
    container_name: ecowitt-receiver
    ports:
      - "${SERVER_PORT:-8080}:8080"
    environment:
      - INFLUXDB_URL=${INFLUXDB_URL:-http://influxdb:8086}
      - INFLUXDB_TOKEN=${INFLUXDB_TOKEN}
      - INFLUXDB_ORG=${INFLUXDB_ORG:-weather}
      - INFLUXDB_BUCKET=${INFLUXDB_BUCKET:-ecowitt}
      - MQTT_ENABLED=${MQTT_ENABLED:-false}
      - MQTT_BROKER=${MQTT_BROKER}
      - MQTT_PORT=${MQTT_PORT:-1883}
      - MQTT_USERNAME=${MQTT_USERNAME}
      - MQTT_PASSWORD=${MQTT_PASSWORD}
      - MQTT_TOPIC=${MQTT_TOPIC:-weather/ecowitt}
      - OUTPUT_UNIT_SYSTEM=${OUTPUT_UNIT_SYSTEM:-metric}
      - TZ=${TZ:-UTC}
    depends_on:
      - influxdb
    restart: unless-stopped
    networks:
      - ecowitt-network

  # InfluxDB - Time series database
  influxdb:
    image: influxdb:2.7
    container_name: ecowitt-influxdb
    ports:
      - "8086:8086"
    volumes:
      - influxdb-data:/var/lib/influxdb2
      - influxdb-config:/etc/influxdb2
    environment:
      - DOCKER_INFLUXDB_INIT_MODE=setup
      - DOCKER_INFLUXDB_INIT_USERNAME=admin
      - DOCKER_INFLUXDB_INIT_PASSWORD=adminpassword
      - DOCKER_INFLUXDB_INIT_ORG=${INFLUXDB_ORG:-weather}
      - DOCKER_INFLUXDB_INIT_BUCKET=${INFLUXDB_BUCKET:-ecowitt}
      - DOCKER_INFLUXDB_INIT_RETENTION=${DATA_RETENTION_DAYS:-90}d
      - DOCKER_INFLUXDB_INIT_ADMIN_TOKEN=${INFLUXDB_TOKEN}
    restart: unless-stopped
    networks:
      - ecowitt-network

  # Grafana - Visualization (optional)
  grafana:
    image: grafana/grafana:latest
    container_name: ecowitt-grafana
    ports:
      - "3000:3000"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
    depends_on:
      - influxdb
    restart: unless-stopped
    networks:
      - ecowitt-network
    profiles:
      - grafana

  # Dashboard - Web frontend (optional)
  dashboard:
    build: ./dashboard
    container_name: ecowitt-dashboard
    ports:
      - "3001:80"
    depends_on:
      - receiver
    restart: unless-stopped
    networks:
      - ecowitt-network
    profiles:
      - dashboard

volumes:
  influxdb-data:
  influxdb-config:
  grafana-data:

networks:
  ecowitt-network:
    driver: bridge
